worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Rate limiting zones ──────────────────────────────────────────
    # General API: 30 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;

    # Benchmark submission: stricter, 10 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_submit:10m rate=10r/m;

    # Custom error responses for rate limiting
    limit_req_status 429;

    # ── Logging ──────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── General settings ─────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 1m;

    # ── Upstream (Node.js backend) ───────────────────────────────────
    upstream node_backend {
        server app:5000;
    }

    # Shared proxy headers, reused by every API location below.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Port 80: ACME challenge + redirect everything else to HTTPS ──
    server {
        listen 80;
        # NOTE: replace api.deimos.example with the real domain before issuing certs.
        server_name api.deimos.example;

        # Let's Encrypt HTTP-01 challenge must stay reachable over plain HTTP.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Port 443: TLS termination + the actual API proxy ─────────────
    server {
        listen 443 ssl;
        http2 on;
        # NOTE: replace api.deimos.example with the real domain before issuing certs.
        server_name api.deimos.example;

        # Cert paths are populated by certbot (see backend/DEPLOY.md).
        ssl_certificate     /etc/letsencrypt/live/api.deimos.example/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.deimos.example/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Health check (no rate limit) ─────────────────────────────
        location = /api/health {
            proxy_pass http://node_backend;
        }

        # ── Benchmark submission (strict rate limit) ─────────────────
        location = /api/benchmark-result {
            limit_req zone=api_submit burst=5 nodelay;
            proxy_pass http://node_backend;
        }

        # ── All other API routes (general rate limit) ────────────────
        location /api/ {
            limit_req zone=api_general burst=10 nodelay;
            proxy_pass http://node_backend;
        }

        # ── Custom 429 error page ────────────────────────────────────
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error": "Too many requests. Please try again later."}';
        }
    }
}
