services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: deimos
      POSTGRES_USER: deimos
      POSTGRES_PASSWORD: deimos
    ports:
      - "5432:5432"  
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  # ── Node.js Backend ────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: deimos
      DB_USER: deimos
      DB_PASSWORD: deimos
      CORS_ORIGIN: "*"
    ports:
      - "5000:5000"

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
