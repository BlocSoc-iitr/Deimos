services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"  
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deimos -d deimos"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Node.js Backend ────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "5000:5000"

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-certs:/etc/letsencrypt:ro       # TLS certs issued by certbot
      - certbot-webroot:/var/www/certbot:ro     # ACME HTTP-01 challenge files
    # Reload every 6h so renewed certs are picked up without manual intervention.
    command: >
      sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  # ── Certbot (Let's Encrypt) ────────────────────────────────────
  # First issue: see backend/DEPLOY.md. After that this loop auto-renews.
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done"

volumes:
  pgdata:
  certbot-certs:
  certbot-webroot:
